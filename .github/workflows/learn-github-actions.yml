name: Lint

on: [push]

jobs:
  run-linters-phpunit:
    name: Run linters
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: phpcs, phpunit

      - name: Check PHPunit
        run: make test

      - name: Check linter
        run: make lint

