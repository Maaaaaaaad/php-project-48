name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-linters-phpunit:
    name: Run linters
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2, phpcs, phpunit

      - name: Install
        run: make install

      - name: Validate composer.json and composer.lock
        run: make validate

      - name: Check PHPunit
        run: make test

      - name: Check linter
        run: make lint

